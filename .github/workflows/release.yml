name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.0.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Release (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: win

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install

      - name: Build prompts package
        run: pnpm --filter @aibuddy/prompts build

      - name: Build
        run: pnpm build

      # ================================================================
      # macOS: Import Developer ID certificate into temporary CI keychain
      # Required for codesigning — CI runners have no signing identities
      # ================================================================
      - name: Import Apple signing certificate
        if: matrix.platform == 'mac'
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          echo "$CSC_LINK" | base64 --decode > $CERTIFICATE_PATH

          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -hex 16)

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security import $CERTIFICATE_PATH -P "$CSC_KEY_PASSWORD" \
            -A -t cert -f pkcs12 -k $KEYCHAIN_PATH

          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security list-keychains -d user -s $KEYCHAIN_PATH login.keychain-db

          echo "✅ Signing certificate imported into CI keychain"

      # ================================================================
      # macOS: Write App Store Connect API key for notarization
      # API key approach is preferred over Apple ID + app-specific password
      # ================================================================
      - name: Prepare Apple API key for notarization
        if: matrix.platform == 'mac'
        env:
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
        run: |
          mkdir -p ~/private_keys
          API_KEY_PATH=~/private_keys/AuthKey_${APPLE_API_KEY_ID}.p8
          echo "$APPLE_API_KEY_CONTENT" > "$API_KEY_PATH"
          echo "APPLE_API_KEY_PATH=$API_KEY_PATH" >> $GITHUB_ENV
          echo "✅ API key written to $API_KEY_PATH"

      - name: Package (macOS)
        if: matrix.platform == 'mac'
        run: pnpm package:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_API_KEY: ${{ env.APPLE_API_KEY_PATH }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: S2237D23CB

      # ================================================================
      # macOS: Verify code signing and notarization succeeded
      # ================================================================
      - name: Verify macOS signing and notarization
        if: matrix.platform == 'mac'
        run: |
          DMG_FILE=$(ls release/*.dmg 2>/dev/null | head -1)
          if [ -z "$DMG_FILE" ]; then
            echo "❌ No DMG found in release/"
            exit 1
          fi

          echo "📦 Verifying: $DMG_FILE"

          MOUNT_POINT=$(mktemp -d)
          hdiutil attach "$DMG_FILE" -mountpoint "$MOUNT_POINT" -quiet

          APP_PATH="$MOUNT_POINT/AIBuddy.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "❌ AIBuddy.app not found in DMG"
            hdiutil detach "$MOUNT_POINT" -quiet 2>/dev/null
            exit 1
          fi

          echo "🔍 Checking code signature..."
          codesign --verify --deep --strict "$APP_PATH"
          echo "✅ Code signature valid"

          echo "🛡️ Checking Gatekeeper assessment..."
          spctl -a -v "$APP_PATH" 2>&1 || true

          echo "📋 Checking notarization staple..."
          stapler validate "$APP_PATH" 2>&1 || echo "⚠️ Staple check — notarization may still be processing"

          hdiutil detach "$MOUNT_POINT" -quiet 2>/dev/null
          rm -rf "$MOUNT_POINT"

          echo "✅ macOS verification complete"

      - name: Package (Windows)
        if: matrix.platform == 'win'
        run: pnpm package:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package (Linux)
        if: matrix.platform == 'linux'
        run: pnpm package:linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Release Assets (macOS)
        if: matrix.platform == 'mac'
        uses: softprops/action-gh-release@v1
        with:
          files: |
            release/*.dmg
            release/*.zip
          draft: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Release Assets (Windows)
        if: matrix.platform == 'win'
        uses: softprops/action-gh-release@v1
        with:
          files: |
            release/*.exe
          draft: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Release Assets (Linux)
        if: matrix.platform == 'linux'
        uses: softprops/action-gh-release@v1
        with:
          files: |
            release/*.AppImage
            release/*.deb
            release/*.rpm
            release/*.snap
          draft: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ================================================================
      # Cleanup: Remove temporary keychain and credentials
      # ================================================================
      - name: Cleanup signing keychain
        if: matrix.platform == 'mac' && always()
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          if [ -f "$KEYCHAIN_PATH" ]; then
            security delete-keychain $KEYCHAIN_PATH 2>/dev/null || true
          fi
          rm -f $RUNNER_TEMP/certificate.p12
          rm -f ~/private_keys/AuthKey_*.p8
